<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e1116">
  <title>Навигатор</title>

  <!-- PWA: инсталируем на началния екран, отваря се standalone -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Навигатор">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">

  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <section id="view-login" hidden>
    <div class="login-wrap">
      <h1>Навигатор</h1>
      <form id="login-form" class="card">
        <label class="field">Имейл
          <input type="email" id="login-email" autocomplete="username" required>
        </label>
        <label class="field">Парола
          <input type="password" id="login-password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn-big accent">Вход</button>
        <p id="login-error" class="error-line" hidden></p>
      </form>
    </div>
  </section>

  <main id="view-app" hidden>
    <section id="tab-today"></section>
    <section id="tab-progress" hidden></section>
    <section id="tab-achievements" hidden></section>
    <section id="tab-data" hidden></section>
  </main>

  <nav class="tabbar" id="tabbar" hidden>
    <button data-tab="today">🏠<span>Днес</span></button>
    <button data-tab="progress">📈<span>Прогрес</span></button>
    <button data-tab="achievements">🏆<span>Постижения</span></button>
    <button data-tab="data">🗂<span>Данни</span></button>
  </nav>

  <div id="sheet-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
